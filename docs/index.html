<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamesZone</title>
    <link rel="icon" type="image/x-icon" href="fav.ico">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script type="text/javascript" src="list.js"></script>
    <style>
      :root {
        --bg:        #080808;
        --surface:   #101010;
        --border:    #1e1e1e;
        --border-hi: #2e2e2e;
        --text:      #e8e8e8;
        --muted:     #484848;
        --accent:    #e8e8e8;
        --danger:    #c0392b;
        --radius:    4px;
        --mono:      'DM Mono', monospace;
        --sans:      'Syne', sans-serif;
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        -webkit-font-smoothing: antialiased;
      }

      /* Subtle grain overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 128px 128px;
      }

      /* ─── CONTAINER ─── */
      .container {
        width: 100%;
        max-width: 680px;
        padding: 0 28px;
        position: relative;
        z-index: 2;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        transition: justify-content 0.4s ease;
      }

      .container.active {
        justify-content: flex-start;
        padding-top: 88px;
        padding-bottom: 120px;
      }

      /* ─── TITLE ─── */
      .title {
        font-family: var(--sans);
        font-size: 52px;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--text);
        margin-bottom: 40px;
        transition: font-size 0.4s ease, margin-bottom 0.4s ease, opacity 0.4s ease;
        line-height: 1;
      }

      .title span {
        color: var(--muted);
      }

      .container.active .title {
        font-size: 24px;
        margin-bottom: 28px;
      }

      /* ─── SEARCH ─── */
      .search-container {
        display: flex;
        align-items: center;
        gap: 0;
        border-bottom: 1px solid var(--border-hi);
        padding-bottom: 2px;
        max-width: 600px;
        width: 100%;
        margin: 0 auto;
        transition: border-color 0.3s ease;
      }

      .search-container:focus-within {
        border-bottom-color: var(--text);
      }

      .search-bar {
        flex: 1;
        padding: 14px 0;
        font-size: 16px;
        font-family: var(--sans);
        font-weight: 400;
        letter-spacing: 0.01em;
        border: none;
        background: transparent;
        color: var(--text);
        outline: none;
        caret-color: var(--text);
      }

      .search-bar::placeholder {
        color: var(--muted);
        font-weight: 400;
      }

      .search-button {
        font-size: 18px;
        padding: 10px 0 10px 16px;
        background: transparent;
        color: var(--muted);
        border: none;
        cursor: pointer;
        transition: color 0.2s ease;
        line-height: 1;
      }

      .search-button:hover {
        color: var(--text);
      }

      /* ─── RESULT LIST ─── */
      .result-list {
        list-style: none;
        display: none;
        margin-top: 40px;
        max-width: 600px;
        width: 100%;
        margin-left: auto;
        margin-right: auto;
        animation: fadeUp 0.4s ease forwards;
      }

      .result-item {
        opacity: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 0;
        border-bottom: 1px solid var(--border);
        animation: fadeUp 0.4s ease forwards;
        gap: 20px;
        cursor: default;
        transition: background 0.2s ease;
      }

      .result-item:hover {
        border-bottom-color: var(--border-hi);
      }

      .result-item:last-child {
        border-bottom: none;
      }

      .result-item:hover .item-button {
        opacity: 1;
        transform: translateX(0);
      }

      .item-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        text-align: left;
        min-width: 0;
      }

      .item-name {
        font-size: 14px;
        font-weight: 700;
        color: #909090;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.2s ease;
      }

      .result-item:hover .item-name {
        color: #ffffff;
      }

      .item-meta {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.03em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .item-button {
        flex-shrink: 0;
        font-size: 18px;
        padding: 0;
        background: transparent;
        color: var(--muted);
        border: none;
        cursor: pointer;
        text-decoration: none;
        transition: color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
        opacity: 0.5;
        transform: translateX(-4px);
        line-height: 1;
        display: flex;
        align-items: center;
      }

      .item-button:hover {
        color: var(--text);
        opacity: 1;
        transform: translateX(2px) !important;
      }

      /* ─── MODAL ─── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        animation: fadeIn 0.2s ease;
      }

      .modal-box {
        background: var(--surface);
        border: 1px solid var(--border-hi);
        padding: 32px;
        border-radius: var(--radius);
        max-width: 460px;
        width: 90%;
        color: var(--text);
        animation: fadeUp 0.3s ease;
      }

      .modal-title {
        font-family: var(--sans);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 24px;
        line-height: 1.3;
      }

      .modal-links {
        list-style: none;
        padding: 0;
        margin-bottom: 24px;
      }

      .result-li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid var(--border);
        transition: color 0.2s ease;
      }

      .result-li:last-child {
        border-bottom: none;
      }

      .result-li span {
        font-family: var(--mono);
        font-size: 12px;
        color: #909090;
        display: flex;
        align-items: center;
        gap: 10px;
        letter-spacing: 0.02em;
        transition: color 0.2s ease;
      }

      .result-li:hover span {
        color: #ffffff;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      /* ─── BUTTONS ─── */
      .confirmation-button,
      .clos-button,
      .item-button {
        font-family: var(--mono);
        cursor: pointer;
        border: none;
        transition: opacity 0.2s ease, background 0.2s ease;
      }

      .confirmation-button {
        font-size: 11px;
        padding: 8px 16px;
        background: var(--text);
        color: var(--bg);
        border-radius: var(--radius);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .confirmation-button:hover {
        opacity: 0.8;
      }

      .clos-button {
        font-size: 11px;
        padding: 8px 16px;
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border-hi);
        border-radius: var(--radius);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .clos-button:hover {
        color: var(--text);
        border-color: var(--muted);
      }

      /* ─── FOOTER ─── */
      .footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        padding: 20px 28px;
        z-index: 2;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }

      .footer-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 680px;
        margin: 0 auto;
      }

      .footer p {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.03em;
      }

      .footer-links {
        display: flex;
        gap: 24px;
        align-items: center;
      }

      .footer-links a {
        font-family: var(--mono);
        text-decoration: none;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.03em;
        transition: color 0.2s ease;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .footer-links a:hover {
        color: var(--text);
      }

      .curp { cursor: pointer; }

      /* ─── ANIMATIONS ─── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* ─── STAGGER ─── */
      .result-item:nth-child(1)  { animation-delay: 0.04s; }
      .result-item:nth-child(2)  { animation-delay: 0.08s; }
      .result-item:nth-child(3)  { animation-delay: 0.12s; }
      .result-item:nth-child(4)  { animation-delay: 0.16s; }
      .result-item:nth-child(5)  { animation-delay: 0.20s; }
      .result-item:nth-child(6)  { animation-delay: 0.24s; }
      .result-item:nth-child(7)  { animation-delay: 0.28s; }
      .result-item:nth-child(8)  { animation-delay: 0.32s; }
      .result-item:nth-child(9)  { animation-delay: 0.36s; }
      .result-item:nth-child(10) { animation-delay: 0.40s; }

      /* ─── SCROLLBAR ─── */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--border-hi) var(--bg);
      }
      *::-webkit-scrollbar { width: 6px; }
      *::-webkit-scrollbar-track { background: var(--bg); }
      *::-webkit-scrollbar-thumb { background-color: var(--border-hi); border-radius: 3px; }

      /* ─── MOBILE ─── */
      @media (max-width: 600px) {
        .title { font-size: 36px; }
        .container.active .title { font-size: 20px; }
        .footer-content { flex-direction: column; gap: 10px; text-align: center; }
        .footer-links { justify-content: center; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">GamesZone<span>.</span></h1>
      <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search games...">
        <button class="search-button">
          <i class="bi bi-search"></i>
        </button>
      </div>
      <ul class="result-list"></ul>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <p>GamesZone © 2026 — A safe place to get games.</p>
        <div class="footer-links">
          <a href="https://github.com/2nxty/gz" target="_blank">
            <i class="bi bi-github"></i> GitHub
          </a>
        </div>
      </div>
    </footer>
  </body>
</html>
